services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: vault-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - vault-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: vault-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vault-network
    depends_on:
      - app

  postgres:
    image: postgres:16
    container_name: vault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vault_db
    ports:
      - "5432:5432"
    volumes:
      - vault_pgdata:/var/lib/postgresql/data
    networks:
      - vault-network

networks:
  vault-network:
    driver: bridge

volumes:
  vault_pgdata:
